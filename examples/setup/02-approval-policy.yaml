# ApprovalPolicy — cluster-scoped singleton that configures default
# approval behavior for proposal workflow steps.
#
# If no ApprovalPolicy exists, all approval steps default to Manual.
---
apiVersion: agentic.openshift.io/v1alpha1
kind: ApprovalPolicy
metadata:
  name: cluster
spec:
  maxAttempts: 3
  maxConcurrentRuns: 5
  stages:
    - name: Analysis
      approval: Manual
    - name: Execution
      approval: Manual
    - name: Verification
      approval: Manual
