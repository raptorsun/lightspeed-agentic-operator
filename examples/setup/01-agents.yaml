# Agents — cluster-scoped tiers that pair an LLM provider with a model and
# runtime settings. Referenced by name from AgenticRun steps.
#
# Agents define infrastructure tiers (smart vs fast). The model is specified
# here, so multiple agents can share one LLMProvider with different models.
# Domain-specific tooling (skills images, required secrets) is specified on
# AgenticRuns via spec.tools.
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: smart
spec:
  llmProvider:
    name: vertex-ai
  model: claude-opus-4-6
  timeouts:
    analysisSeconds: 300
    executionSeconds: 600
    verificationSeconds: 300
  maxTurns: 200
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: fast
spec:
  llmProvider:
    name: vertex-ai
  model: claude-haiku-4-5
  timeouts:
    analysisSeconds: 120
    executionSeconds: 300
    verificationSeconds: 120
  maxTurns: 100
---
# The "default" agent must exist — the operator uses it when a
# AgenticRun step omits the agent field.
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: default
spec:
  llmProvider:
    name: vertex-ai
  model: claude-opus-4-6
  maxTurns: 200
