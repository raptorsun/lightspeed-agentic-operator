apiVersion: v1
kind: ServiceAccount
metadata:
  name: lightspeed-agent
  namespace: default
automountServiceAccountToken: false
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: lightspeed-agent
  namespace: default
spec:
  networkPolicyManagement: Unmanaged
  podTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: lightspeed-mock-agent
    spec:
      serviceAccountName: lightspeed-agent
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: quay.io/openshift-lightspeed/ols-qe:lightspeed-mock-agent
          args: ["-addr", ":8080"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: home
              mountPath: /home/agent
            - name: skills-workdir
              mountPath: /app/skills/.agents
      volumes:
        - name: skills
          image:
            reference: placeholder:latest
        - name: home
          emptyDir: {}
        - name: skills-workdir
          emptyDir: {}
