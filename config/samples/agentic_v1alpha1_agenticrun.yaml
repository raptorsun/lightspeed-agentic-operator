apiVersion: agentic.openshift.io/v1alpha1
kind: AgenticRun
metadata:
  name: fix-crashloop
  namespace: openshift-lightspeed
spec:
  request: "Pod api-server-xyz is crash looping in production namespace"
  targetNamespaces:
    - production
  analysis:
    agent: smart
  execution:
    agent: default
  verification:
    agent: fast
