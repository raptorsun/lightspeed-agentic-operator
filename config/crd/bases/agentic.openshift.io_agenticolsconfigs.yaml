---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: agenticolsconfigs.agentic.openshift.io
spec:
  group: agentic.openshift.io
  names:
    kind: AgenticOLSConfig
    listKind: AgenticOLSConfigList
    plural: agenticolsconfigs
    singular: agenticolsconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.suspended
      name: Suspended
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: "AgenticOLSConfig is a cluster-scoped singleton that controls
          system-wide\nagentic behavior. The cluster admin creates a single AgenticOLSConfig\nnamed
          \"cluster\". When spec.suspended is true, all non-terminal proposals\nare
          terminated and no new workflow steps are started.\n\nWhen no AgenticOLSConfig
          CR exists, the system behaves as if\nsuspended is false — the CR is not
          required for normal operation.\n\nExample:\n\n\tapiVersion: agentic.openshift.io/v1alpha1\n\tkind:
          AgenticOLSConfig\n\tmetadata:\n\t  name: cluster\n\tspec:\n\t  suspended:
          false\n\t  audit:\n\t    logging: Enabled\n\t    otel:\n\t      endpoint:
          \"jaeger-otlp-grpc.observability.svc:4317\"\n\t      tlsMode: Insecure"
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired system configuration.
            minProperties: 1
            properties:
              audit:
                description: |-
                  audit configures compliance audit logging and OpenTelemetry tracing.
                  When absent, logging defaults to enabled with no OTEL export.
                minProperties: 1
                properties:
                  logging:
                    default: Enabled
                    description: |-
                      logging enables structured JSON audit events to stdout.
                      Default: Enabled (when field is empty or config CR absent).
                    enum:
                    - Enabled
                    - Disabled
                    type: string
                  otel:
                    description: |-
                      otel configures OpenTelemetry tracing export.
                      When nil or endpoint empty, uses no-op tracer (no export).
                    minProperties: 1
                    properties:
                      endpoint:
                        description: |-
                          endpoint is the OTLP gRPC endpoint (e.g., "jaeger-otlp-grpc.observability.svc:4317").
                          When empty, no OTEL traces are exported (no-op tracer used).
                        maxLength: 253
                        minLength: 1
                        type: string
                      tlsMode:
                        default: Secure
                        description: |-
                          tlsMode controls TLS for the OTLP connection.
                          "Secure" (default) requires TLS; "Insecure" disables TLS.
                        enum:
                        - Secure
                        - Insecure
                        type: string
                    type: object
                type: object
              suspended:
                default: false
                description: |-
                  suspended halts all agentic operations cluster-wide when set to true.
                  All non-terminal proposals are immediately terminated with an
                  EmergencyStopped condition. Setting back to false re-enables the
                  system for new proposals only — EmergencyStopped proposals remain
                  terminal and must be recreated explicitly.
                type: boolean
            type: object
          status:
            description: status defines the observed state of AgenticOLSConfig.
            minProperties: 1
            properties:
              conditions:
                description: |-
                  conditions represent the latest available observations of the
                  config's state. The "Suspended" condition tracks whether the
                  kill switch is active and all proposals have been terminated.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 8
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: AgenticOLSConfig must be named 'cluster' (singleton)
          rule: self.metadata.name == 'cluster'
    served: true
    storage: true
    subresources:
      status: {}
